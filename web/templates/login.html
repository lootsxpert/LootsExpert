{% extends "base.html" %}

{% block title %}Admin Login — Price Graph{% endblock %}

{% block content %}
<div class="auth-wrapper py-10 px-4 flex justify-center items-center">
  <div class="auth-card max-w-md w-full bg-white border border-slate-200 shadow-xl rounded-2xl p-8">
    <div class="auth-header text-center mb-6">
      <h2 class="text-2xl font-black text-slate-800 font-outfit">Admin Login</h2>
      <p class="text-xs text-slate-500 mt-1">Access the administrator panel database controls and configuration settings.</p>
    </div>

    {% if error %}
      <div class="alert alert-danger mb-4 p-3 bg-red-50 border border-red-100 text-red-600 rounded-xl text-xs flex gap-2 items-center">
        <i class="fa-solid fa-triangle-exclamation"></i> <span>{{ error }}</span>
      </div>
    {% endif %}

    {% if msg %}
      <div class="alert alert-success mb-4 p-3 bg-green-50 border border-green-100 text-green-600 rounded-xl text-xs flex gap-2 items-center">
        <i class="fa-solid fa-circle-check"></i> <span>{{ msg }}</span>
      </div>
    {% endif %}

    <form action="/login" method="POST" class="auth-form space-y-4">
      <div class="form-group">
        <label for="username" class="block text-xs font-bold text-slate-600 mb-1"><i class="fa-solid fa-user"></i> Username</label>
        <input type="text" id="username" name="username" placeholder="Enter administrator username" required autocomplete="off" class="w-full p-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-600">
      </div>

      <div class="form-group">
        <label for="password" class="block text-xs font-bold text-slate-600 mb-1"><i class="fa-solid fa-lock"></i> Password</label>
        <input type="password" id="password" name="password" placeholder="Enter administrator password" required class="w-full p-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-600">
      </div>

      <button type="submit" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm rounded-xl transition-all">Log In as Admin</button>
    </form>
  </div>
</div>
{% endblock %}
